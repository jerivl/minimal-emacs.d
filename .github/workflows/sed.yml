# Makes init.el and early-init.el idempotent to change
name: Remove lines
on:
  push:
    branches:
      - main
      - update
    paths:
      - 'pre-init.el'
      - 'init.el'
  pull_request:
    branches:
      - main
      - update
    paths:
      - 'pre-init.el'
      - 'init.el'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # The token is required to push changes back to the repository
          token: ${{ secrets.CI }} 

      - name: Remove lines
        # The 'run' keyword executes shell commands
        run: |
          # Define a shell variable for clarity
          SERVICE_VERSION=$(git rev-parse --short HEAD)

          # Download stable version 1.42
          curl --output early-init.el "https://raw.githubusercontent.com/jamescherti/minimal-emacs.d/0d07164f86e396884d7b3562abb94ce1b93d2f8f/early-init.el"
          curl --output init.el "https://raw.githubusercontent.com/jamescherti/minimal-emacs.d/0d07164f86e396884d7b3562abb94ce1b93d2f8f/init.el"
          
          # Use sed to replace the placeholder
          # -i flag for inline editing
          # 's|...|...|g' is the substitution syntax. We use '|' as delimiter to avoid escaping '/' in URLs/paths
          # Note: The -i flag's behavior can differ slightly between GNU sed (Linux) and BSD sed (macOS).
          # On Linux, `sed -i` works. On macOS, you might need `sed -i ''`. Ubuntu runners are Linux.
          
          # 2,21d: initial comment block after lexical-binding to ';;; Code:'
          # 98,109d: disable vars that check for other user files
          # 129,130d: disable check for home directory emacs configs
          # 160,161d: minimal-emacs-load-user-init invoked
          # 485,486d: minimal-emacs-load-user-init invoked
          sed -i "1,21d;98,109d;129,130d;160,161d;485,486d" early-init.el
          
          # 1,22d: Initial comment block including lexical binding up to ';;; Code:'
          # 26,29d: minimal-emacs-load-user-init invoked
          # 566,568d: minimal-emacs-load-user-init invoked
          sed -i "1,22d;26,29d;566,568d" init.el
         
      - name: Add, commit, and push
        # You may pin to the exact commit or the version.
        # uses: actions4git/add-commit-push@2119cc12fc9e451198b0d1c27fbae6fd1b134135
        uses: actions4git/add-commit-push@v1.0.0
