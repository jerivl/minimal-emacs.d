name: CI
on:
  - push
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - 30.1
        python-version:
          - 3.12
    steps:
      # Cask
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Compile
        run: |
          cat pre-early-init.el early-init.el init.el post-init.el | tee tmp
          emacs -batch -L . --eval "(setq user-emacs-directory "${pwd}")"  -f batch-byte-compile tmp
